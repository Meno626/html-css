<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media em HTML5</title>
</head>
<body>
    <h1>Imagens dinâmicas</h1>
    <p>Tente abrir este site em vários dispositivos diferentes ou simplesmente aumente o tamanho do seu navaegador</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/p.png" sizes="image/png">

        <source media="(max-width: 1050px)" srcset="imagens/m.png" type="image/png">

        <img src="imagens/g.png" alt="Imagem Grande">

    </picture>

    <h1>Reproduzir Áudio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5</p>
    <audio src="media/happy-mistake.mp3" controls autoplay></audio>
    <!-- MP3 WAV OGG-->
    <br>
    <audio preload="none" autoplay controls loop>
        <source src="media/happy-mistake.mp3" type="audio/mpeg">
        <source src="media/happy-mistake.ogg" type="audio/ogg">
        <source src="media/happy-mistake.wav" type="audio/wav">
        <p>Infelizmente o seu navegador não consegue reproduzir áudio. <a href="media/happy-mistake.mp3" download="happy-mistake.mp3">Clique aqui para baixar o arquivo</a></p>
    </audio>

    
</body>
</html>
