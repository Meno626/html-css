<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso</p>
    <ul type="square">
        <li><abbr title="Usar a tag <p>">Parágrafos</abbr></li>
        <li><abbr title="Usa-se a tag <h1>">Títulos</abbr>
        <li><abbr title="Usa-se a tag <img>">Imagens</abbr>
        <li><abbr title="Usa-se a tag <abbr>">Abreviações</abbr>
        <li><abbr title="Usa-se a tag <code>">Códigos-fonte</abbr>
        <li><abbr title="Usa-se a tag <ol> e <li>">Listas Numeradas</abbr>
        <li><abbr title="Usa-se a tag <ul> e <li>">Listas com Demarcadores</abbr>
    </ul>
</body>
</html>
